name: generate snake animation

on:
  # run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # allows manual runs from the Actions tab
  workflow_dispatch:

  # run on every push to the default branch
  push:
    branches:
      - main

# minimal permissions: only what's needed to push the output branch
permissions:
  contents: write

# run the bundled JavaScript actions on Node 24 (current LTS) instead of the
# deprecated Node 20 default; opt in now ahead of the runner switch
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # generate a snake eating the contribution graph, in dark + light variants
      - name: generate github-contribution-grid-snake
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.svg?palette=github-light

      # push the generated svgs to the `output` branch
      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
